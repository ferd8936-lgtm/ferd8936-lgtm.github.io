<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퍼드(FERD) - 소방청 질의회신</title>
    <meta name="description" content="소방청 질의회신 및 소방법 전문 해설 제공, 현장을 연결하는 안전관리 IT 플랫폼 퍼드 연구소">
    <meta name="keywords" content="소방법, 소방청 질의회신, 질의회신 해설, 화재안전기준, 다중이용업소 완비증명서, 퍼드, FERD">
    <style>
        @font-face {
            font-family: 'NexonLv2Gothic';
            src: url('NexonLv2Gothic.ttf') format('truetype');
            font-weight: normal; font-style: normal;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'NexonLv2Gothic', sans-serif; line-height: 1.6; color: #000000; background-color: #ffffff; padding-top: 0; display: flex; flex-direction: column; min-height: 100vh; }
        a { text-decoration: none; color: inherit; }
        h1, h2, h3 { color: #000000; font-weight: 700; word-break: keep-all; }
        p { color: #000000; margin-bottom: 1rem; word-break: keep-all; }
        
        /* 폼 요소 전체에 넥슨고딕 명시적 적용 및 글자색 고정 */
        select, input, button { font-family: 'NexonLv2Gothic', sans-serif; color: #000000; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 5rem 2rem; flex: 1; width: 100%; }
        .section-title { font-size: 1.6rem; margin-bottom: 3.5rem; text-align: center; display: flex; align-items: center; justify-content: center; gap: 0.9rem; color: #000000; } /* 제목 글자 크기 축소 */
        .section-title img { height: 4.3rem; width: auto; object-fit: contain; vertical-align: middle; } /* 로고 크기 1.3배 확대 */
        
        .board-controls { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 1.2rem; flex-wrap: wrap; gap: 1rem; color: #000000; font-size: 1.05rem; } /* 문구 위치 유지하며 검색 버튼 아래 끝선과 수평 맞춤 */
        .board-search { display: flex; gap: 0.5rem; }
        .board-search input { padding: 0.6rem 1rem; border: 1px solid #a0aec0; background: #ffffff; color: #000000; border-radius: 6px; outline: none; font-size: 1.05rem; width: 280px; } /* 글자 크기 확대 */
        .board-search button { padding: 0.6rem 1.8rem; background: #e53e3e; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1.05rem; transition: background 0.2s; }
        .board-search button:hover { background: #c53030; }
        
        .board-table { width: 100%; border-collapse: collapse; text-align: center; font-size: 1.05rem; margin-bottom: 2rem; } /* 표 글자 크기 확대 */
        .board-table th { border-top: 2px solid #e53e3e; border-bottom: 1px solid #cbd5e0; padding: 0.8rem 1rem; color: #000000; font-weight: bold; background-color: #f8fafc; font-size: 1.08rem; }
        .board-table td { padding: 0.8rem 1rem; border-bottom: 1px solid #e2e8f0; color: #000000; }
        .board-table tr:hover td { background-color: #f8fafc; }
        .board-table .title-cell { text-align: left; cursor: pointer; color: #000000; font-weight: 500; font-size: 1.05rem; } /* 리스트 제목 크기도 밸런스 유지 */
        .board-table .title-cell:hover { text-decoration: underline; color: #e53e3e; }

        /* 10개씩 끊어 보여주는 페이징 번호 디자인 추가 */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 0.5rem; margin-top: 1.5rem; margin-bottom: 2rem; }
        .pagination button { padding: 0.4rem 0.9rem; border: 1px solid #cbd5e0; background: #ffffff; color: #000000; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .pagination button.active { background: #e53e3e; color: #ffffff; border-color: #e53e3e; }
        .pagination button:hover:not(.active) { background: #f8fafc; }

        /* 회사 정보 영역 다크 테마 원상 복원 */
        footer { background: #161b22; border-top: 1px solid #2d3748; padding: 0.8rem 1rem 0.5rem 1rem; margin-top: auto; }
        .footer-grid { max-width: 1200px; margin: 0 auto; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 4rem; border-bottom: 1px solid #2d3748; padding-bottom: 0.5rem; }
        .footer-item { display: flex; flex-direction: column; align-items: flex-start; gap: 0.2rem; }
        .footer-info p:first-child { color: #a0aec0; font-size: 0.65rem; margin-bottom: 0; text-align: left; }
        .footer-info p:last-child { color: #fff; font-size: 0.85rem; font-weight: normal; margin-bottom: 0; text-align: left; }
        .footer-copyright { text-align: center; margin-top: 0.5rem; font-size: 0.75rem; color: #718096; }

        /* 모바일 기기 최적화 (반응형) */
        @media (max-width: 768px) {
            /* 1. 제목 글자 크기 조정 및 줄바꿈 방지 */
            .section-title { font-size: 1.1rem; white-space: nowrap; gap: 0.5rem; }
            .section-title img { height: 3rem; }

            /* 2. 검색창 및 검색 버튼 높이 일치, 글자 줄바꿈 방지 */
            .board-search { align-items: stretch; width: 100%; }
            .board-search input { flex: 1; box-sizing: border-box; width: 100%; }
            .board-search button { white-space: nowrap; box-sizing: border-box; }

            /* 3. 표 '번호' 줄바꿈 방지 및 행 높이 최적화 */
            .board-table th:first-child, .board-table td:first-child { white-space: nowrap; width: 1% !important; padding-left: 0.5rem; padding-right: 0.5rem; }

            /* 4. 푸터 2x2 배열 및 간격 최소화 */
            .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem 0.5rem; padding-bottom: 0; }
            .footer-item { align-items: flex-start; }
        }
    </style>
</head>
<body>
    <section class="container">
        <h2 class="section-title"><a href="index.html"><img src="logo.png" alt="FERD 로고"></a>질의회신 해설</h2>
        
        <div class="board-controls">
            <div id="totalCount" style="color: #000000; font-size: 1.05rem;">총 <strong>10</strong>건</div>
            <div class="board-search">
                <input type="text" id="searchInput" placeholder="키워드 검색 후 엔터" onkeyup="if(window.event.keyCode==13){filterTable()}">
                <button type="button" onclick="filterTable()">검색</button>
            </div>
        </div>

        <table class="board-table" id="qaTable">
            <thead>
                <tr>
                    <th style="width: 15%;">번호</th>
                    <th style="width: 70%;">제목</th>
                    <th style="width: 15%;">년도</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>2</td><td class="title-cell" onclick="window.open('qa-2.html', '_blank')">1층 일반음식점의 식품저장 창고를 지하 1층에 설치하면 완비 여부 </td><td>2025년</td></tr>
                <tr><td>1</td><td class="title-cell" onclick="window.open('qa-1.html', '_blank')">최근 완비를 받은 영업장에 다른 일반음식점을 하나 더 추가하여 영업 신고를 하려고 할 때 완비 여부</td><td>2025년</td></tr>
                
            </tbody>
        </table>
        <div id="pagination" class="pagination"></div>
    </section>

    <footer>
        <div class="footer-grid">
            <div class="footer-item"><div class="footer-info"><p>COMPANY</p><p>퍼드 (FERD)</p></div></div>
            <div class="footer-item"><div class="footer-info"><p>ADDRESS</p><p>대구 수성구 청수로 3층</p></div></div>
            <div class="footer-item"><div class="footer-info"><p>CONTACT</p><p>0507-1353-5682</p></div></div>
            <div class="footer-item"><div class="footer-info"><p>EMAIL</p><p>ferd@ferd.co.kr</p></div></div>
        </div>
        <div class="footer-copyright">
            &copy; 2021 FERD. ALL RIGHTS RESERVED.
        </div>
    </footer>

    <script>
        const rowsPerPage = 10;
        let currentPage = 1;
        let filteredRows = [];

        function initTable() {
            const table = document.getElementById("qaTable");
            const tr = Array.from(table.getElementsByTagName("tr")).slice(1);
            filteredRows = tr;
            setupPagination();
            showPage(1);
        }

        function filterTable() {
            const input = document.getElementById("searchInput");
            const filter = input.value.toLowerCase();
            const table = document.getElementById("qaTable");
            const tr = Array.from(table.getElementsByTagName("tr")).slice(1);

            filteredRows = tr.filter(row => {
                const tdTitle = row.getElementsByTagName("td")[1];
                const tdYear = row.getElementsByTagName("td")[2];
                if (tdTitle) {
                    const titleText = tdTitle.textContent.toLowerCase();
                    const yearText = tdYear ? tdYear.textContent.toLowerCase() : "";
                    return titleText.indexOf(filter) > -1 || yearText.indexOf(filter) > -1;
                }
                return false;
            });

            document.getElementById("totalCount").innerHTML = `총 <strong>${filteredRows.length}</strong>건`;
            currentPage = 1;
            setupPagination();
            showPage(1);
        }

        function showPage(page) {
            currentPage = page;
            const table = document.getElementById("qaTable");
            const tr = Array.from(table.getElementsByTagName("tr")).slice(1);
            
            tr.forEach(row => row.style.display = "none");

            const start = (page - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const pageRows = filteredRows.slice(start, end);

            pageRows.forEach(row => row.style.display = "");

            const buttons = document.querySelectorAll(".pagination button");
            buttons.forEach(btn => {
                if (parseInt(btn.innerText) === page) btn.classList.add("active");
                else btn.classList.remove("active");
            });
        }

        function setupPagination() {
            const paginateContainer = document.getElementById("pagination");
            paginateContainer.innerHTML = "";
            
            const pageCount = Math.ceil(filteredRows.length / rowsPerPage);
            if (pageCount <= 1) return;

            for (let i = 1; i <= pageCount; i++) {
                const btn = document.createElement("button");
                btn.innerText = i;
                if (i === currentPage) btn.classList.add("active");
                btn.addEventListener("click", () => showPage(i));
                paginateContainer.appendChild(btn);
            }
        }

        window.onload = initTable;
    </script>
</body>
</html>
