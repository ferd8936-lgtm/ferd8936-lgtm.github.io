<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="App 설치 없이 문자로 끝내는 100% 합법적인 화재수신기 원격 감시·제어 시스템, 퍼드(FERD)">
    <meta name="keywords" content="퍼드, FERD, 셉시스템, SEB, 세이프링크, 화재수신기, 비화재보, 소방안전, 원격제어">
    <title>퍼드(FERD), 현장을 연결하는 안전관리 IT 플랫폼</title>
    <style>
        @font-face {
            font-family: 'NexonLv2Gothic';
            src: url('NexonLv2Gothic.ttf') format('truetype');
            font-weight: normal; font-style: normal;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'NexonLv2Gothic', sans-serif; line-height: 1.6; color: #e2e8f0; background-color: #0a0a0a; display: flex; flex-direction: column; min-height: 100vh; }
        a { text-decoration: none; color: inherit; }
        h1, h2 { color: #ffffff; font-weight: 700; word-break: keep-all; }
        p { color: #a0aec0; margin-bottom: 1rem; word-break: keep-all; }

        .hero-container { position: relative; flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; background-color: #0a0a0a; padding: 4rem 0; }
        .hero-content { position: relative; z-index: 2; width: 100%; max-width: 1000px; padding: 0 2rem; text-align: center; }
        .hero-logo { width: 280px; margin: 0 auto 0.5rem auto; display: block; cursor: pointer; }
        .hero-content > h1 { font-size: 1.rem; margin-bottom: 3rem; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

        .hero-boxes { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; }
        .hero-box { flex: 1; min-width: 300px; padding: 3rem 2rem; background: rgba(20, 20, 20, 0.7); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; }
        .hero-box h2 { font-size: 1.5rem; margin-bottom: 1rem; color: #fff; }
        .hero-box p { color: #cbd5e0; font-size: 1.15rem; margin-bottom: 2rem; min-height: 50px; }

        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 0.6rem 2rem; font-size: 1.1rem; font-weight: bold; border-radius: 5px; cursor: pointer; transition: all 0.3s ease; text-align: center; }
        .btn-primary { background-color: #e53e3e; color: #fff; border: none; }
        .btn-primary:hover { background-color: #c53030; }
        .btn-secondary { background-color: transparent; color: #fff; border: 2px solid #fff; }
        .btn-secondary:hover { background-color: #fff; color: #1a202c; }

        footer { background: #ffffff; border-top: 1px solid #e2e8f0; padding: 0.4rem 0.8rem; margin-top: auto; }
        .footer-grid { max-width: 1200px; margin: 0 auto; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 2rem; }
        .footer-item { display: flex; flex-direction: column; align-items: flex-start; gap: 0.2rem; }
        .footer-info p { white-space: nowrap; }
        .footer-info p:first-child { color: #718096; font-size: 0.65rem; margin-bottom: 0; text-align: left; }
        .footer-info p:last-child { color: #1a202c; font-size: 0.85rem; font-weight: bold; margin-bottom: 0; text-align: left; }

        /* 질의회신 버튼용 신규 디자인 */
        .btn-outline { background-color: #1a202c; color: #e2e8f0; border: 1px solid #4a5568; border-radius: 30px; }
        .btn-outline:hover { background-color: #2d3748; color: #fff; border-color: #e53e3e; }

        /* 모바일 기기 최적화 (반응형) */
        @media (max-width: 768px) {
            .hero-content > h1 { font-size: 1.6rem; margin-bottom: 2rem; }
            .hero-box { padding: 2rem 1.5rem; min-width: 100%; }
            .footer-grid { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
            .footer-grid .footer-item:first-child { flex-direction: column !important; align-items: flex-start !important; gap: 0.2rem !important; }
            .footer-grid .footer-item img { height: 50px !important; margin: 0 !important; }
        }
    </style>
</head>
<body>
    <section class="hero-container">
        <div class="hero-content">
            <h1>퍼드(FERD), 현장을 연결하는 안전관리 IT 플랫폼</h1>

            <div class="hero-boxes">
                <div class="hero-box">
                    <h2>셉(SEB) 시스템</h2>
                    <p>App 설치 없이 문자로 끝내는<br>합법적인 화재수신기 무인 원격제어 솔루션</p>
                    <a href="seb-system.html" class="btn btn-primary">자세히 알아보기</a>
                </div>

                <div class="hero-box">
                    <h2>세이프링크</h2>
                    <p>현장에 부착된 QR, NFC 태그를 통해<br>종사자 의견청취, 작업중지, 아차사고 접수·관리</p>
                    <button class="btn btn-primary" onclick="alert('준비 중입니다')">자세히 알아보기</button>
                </div>
            </div>

            <div style="margin-top: 3.5rem; display: flex; justify-content: center;">
                <a href="qa-search.html" class="btn btn-outline" style="display: inline-flex; align-items: center; justify-content: center; gap: 0.8rem; padding: 0.6rem 2.5rem; font-size: 1.05rem;">
                    소방법, 산안법 질의회신 해설 검색
                </a>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-grid">
            <div class="footer-item" style="flex-direction: row; align-items: center; gap: 1.5rem;"><img src="logo1.png" alt="FERD 로고" style="height: 70px;"><div class="footer-info"><p>COMPANY</p><p>퍼드 (FERD)</p></div></div>
            <div class="footer-item"><div class="footer-info"><p>ADDRESS</p><p>대구 수성구 청수로 3층</p></div></div>
            <div class="footer-item"><div class="footer-info"><p>CONTACT(문자 가능)</p><p>0507-1353-5682</p></div></div>
            <div class="footer-item"><div class="footer-info"><p>EMAIL</p><p>ferd@ferd.co.kr</p></div></div>
        </div>
    </footer>
</body>
</html>
